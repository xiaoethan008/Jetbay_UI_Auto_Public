name: UI Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEADLESS: "true"
      TEST_ENV: test
      JETBAY_TEST_BASE_URL: ${{ secrets.JETBAY_TEST_BASE_URL }}
      JETBAY_TEST_LOGIN_EMAIL: ${{ secrets.JETBAY_TEST_LOGIN_EMAIL }}
      JETBAY_TEST_LOGIN_PASSWORD: ${{ secrets.JETBAY_TEST_LOGIN_PASSWORD }}
      JETBAY_TEST_DB_NAME: ${{ secrets.JETBAY_TEST_DB_NAME }}
      JETBAY_TEST_DB_HOST: ${{ secrets.JETBAY_TEST_DB_HOST }}
      JETBAY_TEST_DB_PORT: ${{ secrets.JETBAY_TEST_DB_PORT }}
      JETBAY_TEST_DB_USER: ${{ secrets.JETBAY_TEST_DB_USER }}
      JETBAY_TEST_DB_PASSWORD: ${{ secrets.JETBAY_TEST_DB_PASSWORD }}
      JETBAY_TEST_DB_DATABASE: ${{ secrets.JETBAY_TEST_DB_DATABASE }}
      JETBAY_TEST_DB_CHARSET: ${{ secrets.JETBAY_TEST_DB_CHARSET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run smoke test
        run: python -m pytest -v -s tests/test_login.py --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-smoke
          path: allure-results
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-smoke
          path: screenshots
          if-no-files-found: ignore
