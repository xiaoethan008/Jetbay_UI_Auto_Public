name: UI Regression

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HEADLESS: "true"
      TEST_ENV: test
      JETBAY_TEST_BASE_URL: ${{ secrets.JETBAY_TEST_BASE_URL }}
      JETBAY_TEST_LOGIN_EMAIL: ${{ secrets.JETBAY_TEST_LOGIN_EMAIL }}
      JETBAY_TEST_LOGIN_PASSWORD: ${{ secrets.JETBAY_TEST_LOGIN_PASSWORD }}
      JETBAY_TEST_DB_NAME: ${{ secrets.JETBAY_TEST_DB_NAME }}
      JETBAY_TEST_DB_HOST: ${{ secrets.JETBAY_TEST_DB_HOST }}
      JETBAY_TEST_DB_PORT: ${{ secrets.JETBAY_TEST_DB_PORT }}
      JETBAY_TEST_DB_USER: ${{ secrets.JETBAY_TEST_DB_USER }}
      JETBAY_TEST_DB_PASSWORD: ${{ secrets.JETBAY_TEST_DB_PASSWORD }}
      JETBAY_TEST_DB_DATABASE: ${{ secrets.JETBAY_TEST_DB_DATABASE }}
      JETBAY_TEST_DB_CHARSET: ${{ secrets.JETBAY_TEST_DB_CHARSET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run regression suite
        run: python -m pytest -v -s --alluredir=allure-results

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-regression
          path: allure-results
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-regression
          path: screenshots
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-regression
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: regression
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
