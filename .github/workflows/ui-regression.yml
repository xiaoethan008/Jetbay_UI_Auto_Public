name: UI Regression

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HEADLESS: "true"
      TEST_ENV: test
      JETBAY_TEST_BASE_URL: ${{ secrets.JETBAY_TEST_BASE_URL }}
      JETBAY_TEST_LOGIN_EMAIL: ${{ secrets.JETBAY_TEST_LOGIN_EMAIL }}
      JETBAY_TEST_LOGIN_PASSWORD: ${{ secrets.JETBAY_TEST_LOGIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run regression suite
        run: python -m pytest -v -s --alluredir=allure-results

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-regression
          path: allure-results
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-regression
          path: screenshots
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-regression
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: regression
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    if: always()
    needs:
      - regression
      - deploy-report
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure HTML report artifact
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: allure-report-regression
          path: allure-report

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install screenshot dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Capture Allure report screenshot
        if: always()
        run: |
          python - <<'PY'
          import os
          import pathlib
          import threading
          from functools import partial
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer

          from playwright.sync_api import sync_playwright

          report_dir = pathlib.Path("allure-report")
          screenshot_path = pathlib.Path("allure-report-overview.png")

          if not (report_dir / "index.html").exists():
              print("Allure report index.html not found; skipping screenshot.")
              raise SystemExit(0)

          server = ThreadingHTTPServer(
              ("127.0.0.1", 8123),
              partial(SimpleHTTPRequestHandler, directory=str(report_dir.resolve())),
          )
          thread = threading.Thread(target=server.serve_forever, daemon=True)
          thread.start()

          try:
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page(viewport={"width": 1600, "height": 1200})
                  page.goto("http://127.0.0.1:8123/index.html", wait_until="networkidle", timeout=60000)
                  page.screenshot(path=str(screenshot_path), full_page=False)
                  browser.close()
              print(f"Saved screenshot to {screenshot_path}")
          finally:
              server.shutdown()
              server.server_close()
          PY

      - name: Send WeCom notification
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REGRESSION_RESULT: ${{ needs.regression.result }}
          DEPLOY_RESULT: ${{ needs.deploy-report.result }}
          REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          SCREENSHOT_PATH: allure-report-overview.png
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import urllib.request

          webhook = os.getenv("WECOM_WEBHOOK_URL", "").strip()
          if not webhook:
              print("WECOM_WEBHOOK_URL is not configured; skipping notification.")
              raise SystemExit(0)

          regression_result = os.getenv("REGRESSION_RESULT", "unknown")
          deploy_result = os.getenv("DEPLOY_RESULT", "unknown")
          repository = os.getenv("REPOSITORY", "")
          branch = os.getenv("BRANCH", "")
          event_name = os.getenv("EVENT_NAME", "")
          run_url = os.getenv("RUN_URL", "")
          report_url = os.getenv("REPORT_URL", "")
          screenshot_path = os.getenv("SCREENSHOT_PATH", "")

          overall_success = regression_result == "success" and deploy_result in {"success", "skipped"}
          status_text = "SUCCESS" if overall_success else "FAILED"
          status_color = "info" if overall_success else "warning"

          report_line = (
              f"> Report: [Open Allure Report]({report_url})"
              if deploy_result == "success"
              else "> Report: GitHub Pages not available for this run"
          )

          content = "\n".join(
              [
                  f"## UI Regression <font color=\"{status_color}\">{status_text}</font>",
                  f"> Repository: `{repository}`",
                  f"> Branch: `{branch}`",
                  f"> Trigger: `{event_name}`",
                  f"> Regression: `{regression_result}`",
                  f"> Pages Deploy: `{deploy_result}`",
                  f"> Run: [Open GitHub Actions Run]({run_url})",
                  report_line,
              ]
          )

          markdown_payload = {
              "msgtype": "markdown",
              "markdown": {
                  "content": content,
              },
          }

          def send(payload):
              request = urllib.request.Request(
                  webhook,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(request, timeout=15) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  print(body)

          if screenshot_path and os.path.exists(screenshot_path):
              with open(screenshot_path, "rb") as f:
                  image_bytes = f.read()
              image_payload = {
                  "msgtype": "image",
                  "image": {
                      "base64": base64.b64encode(image_bytes).decode("utf-8"),
                      "md5": hashlib.md5(image_bytes).hexdigest(),
                  },
              }
              send(image_payload)

          send(markdown_payload)
          PY
